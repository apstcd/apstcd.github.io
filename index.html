<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>十秒弱网 · 验证通过</title>
<style>
:root{
  --blue:#003F7F;--blue-2:#4A90D9;--blue-tint:rgba(0,63,127,.08);
  --bg:#F8F9FB;--card:#fff;--border:#ECEFF3;
  --text:#1A2233;--text-2:#5F6B7A;--text-3:#9BA4B0;
  --shadow:0 4px 20px rgba(20,30,50,.06);
  --r-card:18px;--r-btn:12px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh}
body{
  background:var(--bg);color:var(--text);
  font-family:-apple-system,"PingFang SC","Microsoft Yahei",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
  display:flex;justify-content:center;align-items:center;
  padding:24px 16px;
}
@keyframes pop{0%{transform:scale(.6);opacity:0}60%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes draw{from{stroke-dashoffset:48}to{stroke-dashoffset:0}}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.box{
  width:100%;max-width:420px;background:var(--card);
  border:1px solid var(--border);border-radius:var(--r-card);
  box-shadow:var(--shadow);padding:22px 24px;text-align:center;
}

/* 品牌头 */
.brand{
  display:flex;align-items:center;justify-content:center;gap:10px;
  padding-bottom:18px;margin-bottom:22px;
  border-bottom:1px solid var(--border);
  animation:rise .5s ease both;
}
.brand img{
  width:34px;height:34px;border-radius:8px;object-fit:cover;
  background:var(--blue-tint);
}
.brand .name{
  display:flex;flex-direction:column;align-items:flex-start;line-height:1.15;
}
.brand .name b{font-size:15.5px;font-weight:700;color:var(--text);letter-spacing:.5px}
.brand .name span{font-size:11px;color:var(--text-3);letter-spacing:1.5px;margin-top:2px}

.check{
  width:84px;height:84px;border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--blue-2));
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 18px;
  box-shadow:0 8px 22px rgba(0,63,127,.28);
  animation:pop .55s cubic-bezier(.2,.8,.3,1.2) both;animation-delay:.1s;
}
.check svg{width:42px;height:42px}
.check svg path{
  fill:none;stroke:#fff;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;
  stroke-dasharray:48;stroke-dashoffset:48;
  animation:draw .45s ease forwards;animation-delay:.45s;
}

h1{
  margin:0 0 8px;font-size:22px;font-weight:700;letter-spacing:.5px;
  animation:rise .5s ease both;animation-delay:.4s;
}
.lead{
  margin:0;color:var(--text-2);font-size:14px;
  animation:rise .5s ease both;animation-delay:.5s;
}

.game{
  margin:22px 0 6px;padding:13px 16px;
  background:var(--blue-tint);border-radius:12px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  font-size:14.5px;color:var(--blue);font-weight:600;
  animation:rise .5s ease both;animation-delay:.6s;
}
.game img{width:22px;height:22px;border-radius:5px;object-fit:cover}

.actions{
  display:flex;gap:10px;margin-top:18px;
  animation:rise .5s ease both;animation-delay:.7s;
}
.btn{
  flex:1;display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 0;border-radius:var(--r-btn);
  font-size:13.5px;font-weight:600;text-decoration:none;
  transition:all .2s ease;
  background:var(--blue);color:#fff;border:1.5px solid var(--blue);
}
.btn:hover{background:var(--blue);color:#fff;transform:translateY(-1px);box-shadow:0 6px 14px rgba(0,63,127,.22)}
.btn--ghost{background:#fff;color:var(--blue);border-color:var(--blue)}
.btn--ghost:hover{background:var(--blue-tint);box-shadow:none}
.btn svg{flex:0 0 auto}

.time{
  margin-top:14px;color:var(--text-3);font-size:11.5px;
  font-variant-numeric:tabular-nums;
  animation:rise .5s ease both;animation-delay:.8s;
}

@media(max-width:380px){
  .box{padding:20px 18px}
  .brand img{width:30px;height:30px}
  .brand .name b{font-size:14.5px}
  .check{width:74px;height:74px;margin-bottom:14px}
  .check svg{width:36px;height:36px}
  h1{font-size:20px}
  .lead{font-size:13.5px}
}
</style>
</head>
