<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>简易自选商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
body{background:#f3f4f6;}
header{background:#23272f;color:#fff;padding:16px;text-align:center;}
.container{max-width:1080px;margin:25px auto;padding:0 15px;}
.goods-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;}
.card{background:#fff;border-radius:6px;padding:15px;box-shadow:0 1px 4px #ddd;}
.card img{width:100%;height:150px;object-fit:cover;border-radius:4px;margin-bottom:10px;}
.card h4{font-size:16px;color:#222;}
.price{color:#e64340;font-weight:bold;margin:8px 0;}
.desc{font-size:13px;color:#666;margin-bottom:12px;}
.buy-btn{background:#0275d8;color:#fff;border:none;padding:8px 0;width:100%;border-radius:4px;cursor:pointer;}
.empty{text-align:center;color:#999;padding:60px;font-size:15px;}

/* 下单弹窗 */
.pop{position:fixed;top:0;left:0;width:100%;height:100%;background:#0007;display:none;align-items:center;justify-content:center;z-index:99;}
.pop-box{background:#fff;width:90%;max-width:420px;padding:25px;border-radius:8px;}
.pop h5{font-size:17px;margin-bottom:15px;}
.pop p{margin:6px 0;color:#333;}
.pop input{width:100%;padding:10px;margin:12px 0;border:1px #ccc solid;border-radius:4px;}
.pop-btns{display:flex;gap:10px;margin-top:15px;}
.cancel{flex:1;padding:9px;border:1px #999 solid;background:#fff;border-radius:4px;cursor:pointer;}
.pay{flex:1;padding:9px;border:none;background:#0275d8;color:#fff;border-radius:4px;cursor:pointer;}
</style>
</head>
<body>

<header>
    <h3>简易自选购物商城</h3>
</header>

<div class="container">
    <div class="goods-grid" id="goodsList"></div>
    <div class="empty" id="emptyTip" style="display:none;">暂无上架商品，请稍后再看</div>
</div>

<!-- 下单弹窗 -->
<div class="pop" id="popWin">
    <div class="pop-box">
        <h5>确认下单</h5>
        <p>商品：<span id="popName"></span></p>
        <p>价格：<span id="popPrice"></span></p>
        <input type="text" id="popNote" placeholder="填写联系方式/备注信息">
        <div class="pop-btns">
            <button class="cancel" onclick="closePop()">取消</button>
            <button class="pay" onclick="submitPay()">去支付</button>
        </div>
    </div>
</div>

<script>
// ========== 1、你的腾讯表格API（已填好你的ID） ==========
const TABLE_API = "https://docs.qq.com/sheet/DS0ZCUXN2cFFLd3R4";

// ========== 2、你的OKPAY商户配置 ==========
const OK_SHOP_ID = "29667";
const OK_SHOP_KEY = "9VfeiQTmURvy5BCsEzI3SFWpYL4Jw7an";
const OK_PAY_URL = "https://api.okaypay.me/shop/"; // 你后续替换成真实支付接口

// 全局存当前选中商品
let nowGoodsName = "";
let nowGoodsPrice = "";

// 加载表格商品
async function loadGoods(){
    let res = await fetch(TABLE_API);
    let data = await res.json();
    let rows = data.clientVars.collab_client_vars.initialAttributedText.text[0][2];
    let html = "";

    // 跳过表头，循环商品
    for(let i=1; i<rows.length; i++){
        let cell = rows[i][0].c;
        let name = cell[1]?.v || "";
        let price = cell[2]?.v || "";
        let desc = cell[3]?.v || "";
        let status = cell[4]?.v || "";
        let img = cell[5]?.v || "";

        if(status !== "上架") continue;

        html += `
        <div class="card">
            <img src="${img}" onerror="this.src='https://via.placeholder.com/230x150'">
            <h4>${name}</h4>
            <div class="price">${price}</div>
            <div class="desc">${desc}</div>
            <button class="buy-btn" onclick="openPop('${name}','${price}')">立即购买</button>
        </div>
        `;
    }

    document.getElementById("goodsList").innerHTML = html;
    if(!html) document.getElementById("emptyTip").style.display = "block";
}

// 打开下单弹窗
function openPop(name,price){
    nowGoodsName = name;
    nowGoodsPrice = price;
    document.getElementById("popName").innerText = name;
    document.getElementById("popPrice").innerText = price;
    document.getElementById("popWin").style.display = "flex";
}

// 关闭弹窗
function closePop(){
    document.getElementById("popWin").style.display = "none";
}

// 提交支付跳转OKPAY
function submitPay(){
    let note = document.getElementById("popNote").value;
    let orderNo = "ORD" + Date.now();
    let numPrice = nowGoodsPrice.replace("USDT","").trim();

    // 拼接支付链接
    let payLink = `${OK_PAY_URL}?shop_id=${OK_SHOP_ID}&order_id=${orderNo}&amount=${numPrice}&title=${encodeURIComponent(nowGoodsName)}&remark=${encodeURIComponent(note)}`;

    alert("即将跳转到支付页面！\n订单号："+orderNo);
    window.open(payLink,"_blank");
    closePop();
}

// 页面加载自动读取表格
window.onload = loadGoods;
</script>

</body>
</html>
